<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>School Enrollment System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <img src="images/school.jpg" alt="School Image" class="logo">

        <h2>Student Enrollment Form</h2>

        <form id="enrollmentForm">
            
            <label for="studentName">Student Full Name:</label>
            <input type="text" id="studentName" placeholder="Enter full name">

            <label for="dob">Date of Birth:</label>
            <input type="date" id="dob">

            <label for="grade">Grade Applying For:</label>
            <select id="grade">
                <option value="">-- Select Grade --</option>
                <option value="Form 1">Form 1</option>
                <option value="Form 2">Form 2</option>
                <option value="Form 3">Form 3</option>
                <option value="Form 4">Form 4</option>
                <option value="Form 5">Form 5</option>
                <option value="Form 6">Form 6</option>
            </select>

            <button type="submit">Submit Enrollment</button>

            <p id="errorMessage" class="error"></p>
            <p id="successMessage" class="success"></p>

            <p class="note">No cellphones allowed in the school premises</p>

        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
